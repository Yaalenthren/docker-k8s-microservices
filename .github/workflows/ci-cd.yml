name: Docker Build and Push

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build frontend image
        run: docker build -t yaalenthren/frontend:latest ./frontend

      - name: Build user-service image
        run: docker build -t yaalenthren/user-service:latest ./user-service

      - name: Build product-service image
        run: docker build -t yaalenthren/product-service:latest ./product-service

      - name: Push images to DockerHub
        run: |
          docker push yaalenthren/frontend:latest
          docker push yaalenthren/user-service:latest
          docker push yaalenthren/product-service:latest